<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CM88</title>

<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Be Vietnam Pro', sans-serif;
    background: radial-gradient(circle at top, #020617, #000);
    color: #fff;
}

/* CONTAINER */
.container {
    max-width: 420px;
    margin: auto;
}

/* HEADER */
.header {
    padding: 15px;
    text-align: center;
    background: linear-gradient(90deg, rgba(79,70,229,0.3), rgba(56,189,248,0.2));
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.logo {
    font-size: 30px;
    font-weight: 700;
    background: linear-gradient(90deg, #4f46e5, #38bdf8, #22c55e);
    -webkit-background-clip: text;
    color: transparent;
}

/* BUTTON */
.buttons {
    margin-top: 10px;
}

.btn {
    padding: 12px 18px;
    border-radius: 14px;
    text-decoration: none;
    margin: 5px;
    display: inline-block;
    font-weight: 600;
    transition: 0.3s;
}

.btn-register {
    background: linear-gradient(135deg, #4f46e5, #22c55e);
    box-shadow: 0 0 20px rgba(79,70,229,0.5);
}

.btn-login {
    background: rgba(255,255,255,0.08);
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(56,189,248,0.4);
}

/* ONLINE */
.online {
    text-align: center;
    padding: 10px;
    font-size: 14px;
    color: #94a3b8;
}

/* BANNER */
.banner {
    position: relative;
}

.banner img {
    width: 100%;
    border-radius: 0 0 20px 20px;
}

.banner::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, #000, transparent);
    border-radius: 0 0 20px 20px;
}

/* BOX */
.box {
    margin: 15px;
    padding: 18px;
    border-radius: 18px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
}

.card {
    padding: 18px;
    border-radius: 16px;
    text-align: center;
    background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(0,0,0,0.6));
    border: 1px solid rgba(255,255,255,0.08);
    transition: 0.35s;
    position: relative;
    overflow: hidden;
}

.card::before {
    content: "";
    position: absolute;
    width: 120%;
    height: 120%;
    background: radial-gradient(circle, rgba(56,189,248,0.3), transparent);
    opacity: 0;
    transition: 0.4s;
}

.card:hover::before {
    opacity: 1;
}

.card:hover {
    transform: translateY(-6px) scale(1.03);
}

/* NUMBER */
.number {
    font-size: 34px;
    font-weight: bold;
    background: linear-gradient(90deg, #4f46e5, #22c55e);
    -webkit-background-clip: text;
    color: transparent;
}

/* HOT */
.hot {
    position: absolute;
    top: 6px;
    right: 6px;
    font-size: 10px;
    padding: 3px 7px;
    border-radius: 6px;
    background: linear-gradient(90deg, red, orange);
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: #64748b;
}

/* TOAST */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: linear-gradient(90deg, #4f46e5, #22c55e);
    padding: 10px 18px;
    border-radius: 30px;
    display: none;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <div class="logo">CM88</div>

        <div class="buttons">
            <a href="/register/" class="btn btn-register">Đăng ký ngay</a>
            <a href="/login/" class="btn btn-login">Đăng nhập</a>
        </div>
    </div>

    <div class="online">
        Đang có <span id="online">1287</span> người truy cập
    </div>

    <div class="banner">
        <img src="https://images.unsplash.com/photo-1606925797300-0f9e6a5c3b44?auto=format&fit=crop&w=800&q=80">
    </div>

    <div class="box">
        <h3>🔥 Ưu đãi cực lớn</h3>
        <p>Tham gia ngay để nhận thưởng mỗi ngày, cơ hội không giới hạn.</p>
    </div>

    <div class="box">
        <h3>🔥 Tính năng nổi bật</h3>

        <div class="grid">
            <a href="/register/" class="card" onclick="showToast()">
                <div class="hot">HOT</div>
                <div class="number" id="n1">20</div>
                <p>Đăng ký nhận thưởng</p>
            </a>

            <a href="/login/" class="card" onclick="showToast()">
                <div class="number" id="n2">36</div>
                <p>Đăng nhập</p>
            </a>

            <a href="/code/" class="card" onclick="showToast()">
                <div class="number" id="n3">61</div>
                <p>Nhận code</p>
            </a>

            <a href="/tele/" class="card" onclick="showToast()">
                <div class="number" id="n4">95</div>
                <p>Hỗ trợ Telegram</p>
            </a>
        </div>
    </div>

    <div class="footer">
        © 2026 CM88
    </div>

</div>

<div class="toast" id="toast">Đang chuyển hướng...</div>

<script>
setInterval(() => {
    let num = document.getElementById("online");
    let current = parseInt(num.innerText);
    num.innerText = current + Math.floor(Math.random() * 6 - 3);
}, 2000);

function showToast() {
    let t = document.getElementById("toast");
    t.style.display = "block";
    setTimeout(() => t.style.display = "none", 1200);
}
</script>

</body>
</html>
