<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CM88</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #001a0d, #000);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

.container {
    max-width: 420px;
    margin: auto;
    animation: fadeIn 1s ease;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #00ff66, #004d1a);
    padding: 12px;
    text-align: center;
    box-shadow: 0 0 20px #00ff66;
}

.logo {
    font-size: 30px;
    font-weight: bold;
}

/* BUTTON */
.buttons {
    margin-top: 10px;
}

.btn {
    padding: 12px 20px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    margin: 5px;
    display: inline-block;
    font-weight: bold;
    transition: 0.3s;
}

.btn-register {
    background: linear-gradient(45deg, #ff0000, #ff6600);
    animation: blink 1s infinite;
}

.btn-login {
    background: linear-gradient(45deg, #ffaa00, #ffcc00);
}

.btn:hover {
    transform: scale(1.1);
    box-shadow: 0 0 20px #00ff66;
}

@keyframes blink {
    0% {box-shadow: 0 0 5px red;}
    50% {box-shadow: 0 0 25px yellow;}
    100% {box-shadow: 0 0 5px red;}
}

/* ONLINE */
.online {
    text-align: center;
    margin: 8px 0;
    color: #00ff66;
    font-weight: bold;
}

/* BANNER */
.banner img {
    width: 100%;
    border-bottom: 2px solid #00ff66;
}

/* BOX */
.box {
    background: linear-gradient(145deg, #111, #000);
    margin-top: 10px;
    padding: 15px;
    border-radius: 12px;
    border: 1px solid #00ff66;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.card {
    background: linear-gradient(145deg, #1a1a1a, #000);
    padding: 15px;
    text-align: center;
    border-radius: 12px;
    transition: 0.3s;
    border: 1px solid #00ff66;
    position: relative;
}

.card:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 0 25px #00ff66;
}

.number {
    font-size: 32px;
    color: #00ff66;
    font-weight: bold;
}

/* HOT BADGE */
.hot {
    position: absolute;
    top: 5px;
    right: 5px;
    background: red;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 5px;
}

/* NOTIFICATION */
.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #00ff66;
    color: black;
    padding: 10px 20px;
    border-radius: 30px;
    display: none;
    font-weight: bold;
}

/* FOOTER */
.footer {
    background: #111;
    padding: 20px;
    margin-top: 20px;
    font-size: 12px;
    text-align: center;
    color: #aaa;
}
</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="logo">CM88</div>

        <div class="buttons">
            <a href="/register/" class="btn btn-register">🔥 ĐĂNG KÝ NGAY</a>
            <a href="/login/" class="btn btn-login">ĐĂNG NHẬP</a>
        </div>
    </div>

    <!-- ONLINE -->
    <div class="online">
        🔥 Đang có <span id="online">1287</span> người truy cập
    </div>

    <!-- BANNER -->
    <div class="banner">
        <img src="https://images.unsplash.com/photo-1606925797300-0f9e6a5c3b44?auto=format&fit=crop&w=800&q=80">
    </div>

    <!-- GIỚI THIỆU -->
    <div class="box">
        <h3>🔥 CM88 COM | Trang Chủ</h3>
        <p>Ưu đãi cực lớn - nhận thưởng ngay hôm nay</p>
    </div>

    <!-- DANH SÁCH -->
    <div class="box">
        <h3>📊 DANH SÁCH HOT</h3>

        <div class="grid">

            <a href="/register/" class="card" onclick="showToast()">
                <div class="hot">HOT</div>
                <div class="number" id="n1">20</div>
                <p>Đăng ký nhận thưởng</p>
            </a>

            <a href="/login/" class="card" onclick="showToast()">
                <div class="number" id="n2">36</div>
                <p>Đăng nhập ngay</p>
            </a>

            <a href="/register_code/" class="card" onclick="showToast()">
                <div class="number" id="n3">61</div>
                <p>Nhóm nhận code miễn phí</p>
            </a>

            <a href="/register_tele/" class="card" onclick="showToast()">
                <div class="number" id="n4">95</div>
                <p>TELE ADMIN HỖ TRỢ</p>
            </a>

        </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
        © CM88 - All rights reserved
    </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast">✔ Đang chuyển hướng...</div>

<script>
// FAKE ONLINE
setInterval(() => {
    let num = document.getElementById("online");
    let current = parseInt(num.innerText);
    num.innerText = current + Math.floor(Math.random() * 10 - 5);
}, 2000);

// FAKE CLICK NUMBER
setInterval(() => {
    for (let i = 1; i <= 4; i++) {
        let el = document.getElementById("n" + i);
        el.innerText = parseInt(el.innerText) + Math.floor(Math.random() * 3);
    }
}, 3000);

// TOAST CLICK
function showToast() {
    let t = document.getElementById("toast");
    t.style.display = "block";
    setTimeout(() => {
        t.style.display = "none";
    }, 1500);
}
</script>

</body>
</html>
